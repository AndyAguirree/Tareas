{% extends 'to_do/base.html' %}

{% block title %}Confirmar eliminación{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card border-danger">
        <div class="card-body">
          <h1 class="h4 mb-3">Eliminar tarea</h1>
          <p class="text-muted">Seguro que deseas eliminar:</p>
          <h5 class="mb-3">{{ tarea.titulo }}</h5>

          <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-danger">Sí, eliminar</button>
              <a class="btn btn-outline-secondary" href="{% url 'to_do:tarea_list' %}">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
